###############################################################################
# GitHub Actions — PR Validation Workflow
# Freddie Mac SDLC Terminal
#
# Runs on every Pull Request to:  main, develop, release/*, hotfix/*
# Purpose: Fast feedback loop BEFORE Jenkins full pipeline runs.
#
# Checks:
#   - Branch naming policy (GitFlow)
#   - Commit message convention
#   - TypeScript compilation
#   - ESLint + Prettier
#   - Built-in secret scanner
#   - Unit tests with coverage gate
###############################################################################

name: PR Validation

on:
  pull_request:
    branches:
      - main
      - develop
      - 'release/**'
      - 'hotfix/**'
    types: [opened, synchronize, reopened, ready_for_review]

# Cancel in-progress runs on new pushes to the same PR
concurrency:
  group: pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: '18'

jobs:

  # ── Job 1: Branch Policy Check ───────────────────────────────────────────
  branch-policy:
    name: GitFlow Branch Policy
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "Checking branch: $BRANCH"

          # Protected target branches are always valid sources
          if echo "$BRANCH" | grep -qE '^(main|master|develop)$'; then
            echo "✅ Protected branch — OK"
            exit 0
          fi

          # Must match GitFlow pattern
          if echo "$BRANCH" | grep -qE '^(feature|release|hotfix|bugfix)/[a-z0-9][a-z0-9._-]*$'; then
            echo "✅ Branch name valid: $BRANCH"
            exit 0
          fi

          echo "❌ Branch name '$BRANCH' violates Freddie Mac GitFlow policy."
          echo "   Must match: feature/*, release/*, hotfix/*, bugfix/*"
          echo "   Lowercase only, alphanumeric + hyphens after prefix."
          exit 1

  # ── Job 2: Commit Message Policy ────────────────────────────────────────
  commit-policy:
    name: Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check latest commit message
        run: |
          MSG=$(git log --format="%s" -1)
          echo "Commit message: $MSG"

          PREFIXES="feat:|fix:|hotfix:|chore:|docs:|refactor:|test:|ci:|perf:|merge:"
          if echo "$MSG" | grep -qiE "^($PREFIXES)"; then
            echo "✅ Commit message follows conventional format"
          else
            echo "❌ Commit message '$MSG' does not follow Conventional Commits format."
            echo "   Must start with: feat:, fix:, hotfix:, chore:, docs:, refactor:, test:, ci:, perf:"
            exit 1
          fi

          # Check length
          LENGTH=${#MSG}
          if [ $LENGTH -gt 72 ]; then
            echo "⚠️  Commit subject line is $LENGTH chars (max 72). Please shorten."
            exit 1
          fi

  # ── Job 3: Lint, Compile, Security ──────────────────────────────────────
  code-quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    needs: [branch-policy]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compilation
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint src/ --ext .ts --max-warnings 0

      - name: Prettier format check
        run: npx prettier --check "src/**/*.ts"

      - name: Secret scanner (Freddie Mac built-in)
        run: |
          npm run build
          npm run dev -- scan 2>&1 | tee scan.log
          if grep -q "ERROR" scan.log; then
            echo "❌ Secret scan found ERROR-level violations. Fix before merge."
            cat scan.log
            exit 1
          fi
          echo "✅ Secret scan passed"

      - name: gitleaks (additional secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Job 4: Unit Tests ────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [code-quality]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: |
          npm test -- \
            --ci \
            --coverage \
            --reporters=default \
            --reporters=jest-junit \
            --coverageReporters=text-summary \
            --coverageThreshold='{"global":{"branches":70,"functions":75,"lines":75,"statements":75}}'

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Jest Tests
          path: junit.xml
          reporter: jest-junit

  # ── Job 5: PR Summary Comment ────────────────────────────────────────────
  pr-summary:
    name: Post PR Summary
    runs-on: ubuntu-latest
    needs: [branch-policy, commit-policy, code-quality, unit-tests]
    if: always()
    permissions:
      pull-requests: write
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const results = {
              'Branch Policy':    '${{ needs.branch-policy.result }}',
              'Commit Policy':    '${{ needs.commit-policy.result }}',
              'Code Quality':     '${{ needs.code-quality.result }}',
              'Unit Tests':       '${{ needs.unit-tests.result }}',
            };

            const allPassed = Object.values(results).every(r => r === 'success');
            const icon = allPassed ? '✅' : '❌';

            let body = `## ${icon} PR Validation — ${allPassed ? 'All checks passed' : 'Some checks failed'}\n\n`;
            body += '| Check | Status |\n|-------|--------|\n';
            for (const [name, result] of Object.entries(results)) {
              const emoji = result === 'success' ? '✅' : result === 'failure' ? '❌' : '⚠️';
              body += `| ${name} | ${emoji} ${result} |\n`;
            }

            if (!allPassed) {
              body += '\n> **Freddie Mac Policy:** All checks must pass before merge to protected branches.\n';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
